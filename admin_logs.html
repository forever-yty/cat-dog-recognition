<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统日志 - PetWise 管理后台</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <style>
        .log-container { max-height: 500px; overflow-y: auto; }
        .log-item { padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; }
        .log-info { background: rgba(99,179,237,0.1); border-left: 4px solid #63b3ed; }
        .log-warning { background: rgba(251,146,60,0.1); border-left: 4px solid #fb923c; }
        .log-error { background: rgba(239,68,68,0.1); border-left: 4px solid #ef4444; }
        .log-time { color: #718096; margin-right: 15px; }
        .log-level { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 10px; }
        .level-info { background: rgba(99,179,237,0.2); color: #63b3ed; }
        .level-warning { background: rgba(251,146,60,0.2); color: #fb923c; }
        .level-error { background: rgba(239,68,68,0.2); color: #ef4444; }
        .log-message { color: #2d3748; }
        .log-module { color: #a0aec0; font-size: 12px; margin-top: 5px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-tab { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; background: #e2e8f0; color: #4a5568; }
        .filter-tab.active { background: #63b3ed; color: white; }
        .auto-refresh { display: flex; align-items: center; gap: 8px; color: #718096; font-size: 13px; }
        .refresh-toggle { width: 40px; height: 20px; background: #e2e8f0; border-radius: 10px; cursor: pointer; position: relative; }
        .refresh-toggle.active { background: #63b3ed; }
        .refresh-toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.3s; }
        .refresh-toggle.active::after { left: 22px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">PetWise 管理后台</div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('dashboard')"><span class="menu-icon">📊</span><span>仪表盘</span></div>
            <div class="menu-item" onclick="navigateTo('users')"><span class="menu-icon">👥</span><span>用户管理</span></div>
            <div class="menu-item" onclick="navigateTo('pets')"><span class="menu-icon">🐾</span><span>大模型管理</span></div>
            <div class="menu-item" onclick="navigateTo('knowledge')"><span class="menu-icon">📚</span><span>知识库</span></div>
            <div class="menu-item" onclick="navigateTo('sample')"><span class="menu-icon">🧪</span><span>难样本</span></div>
            <div class="menu-item" onclick="navigateTo('statistics')"><span class="menu-icon">📈</span><span>数据统计</span></div>
            <div class="menu-item active" onclick="navigateTo('logs')"><span class="menu-icon">📋</span><span>系统日志</span></div>
            <div class="menu-item" onclick="navigateTo('config')"><span class="menu-icon">⚙️</span><span>系统配置</span></div>
            <div class="menu-item" onclick="navigateTo('network')"><span class="menu-icon">🌐</span><span>网络配置</span></div>
            <div class="menu-item" onclick="navigateTo('sensitive')"><span class="menu-icon">🔒</span><span>敏感词</span></div>
            <div class="menu-item" onclick="navigateTo('feedback')"><span class="menu-icon">💬</span><span>用户反馈</span></div>
            <div class="menu-item" onclick="navigateTo('notice')"><span class="menu-icon">📢</span><span>公告管理</span></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">系统日志</div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="color: #4a5568; font-size: 14px;">admin</span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">系统日志记录</div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="auto-refresh">
                            <span>自动刷新</span>
                            <div class="refresh-toggle" id="refreshToggle" onclick="toggleAutoRefresh()"></div>
                        </div>
                        <button class="btn btn-primary" onclick="loadLogs()">刷新</button>
                    </div>
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterByLevel('all')">全部</button>
                    <button class="filter-tab" onclick="filterByLevel('INFO')">INFO</button>
                    <button class="filter-tab" onclick="filterByLevel('WARNING')">WARNING</button>
                    <button class="filter-tab" onclick="filterByLevel('ERROR')">ERROR</button>
                </div>
                <div class="log-container" id="logContainer">
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        let currentLevel = 'all';
        let autoRefreshInterval = null;
        let autoRefreshEnabled = false;

        async function loadLogs() {
            try {
                const result = await apiRequest('/api/system_logs?limit=100');
                if (result.success) {
                    displayLogs(result.data);
                } else {
                    displayLogs(getMockLogs());
                }
            } catch (error) {
                console.error('加载日志失败:', error);
                displayLogs(getMockLogs());
            }
        }

        function getMockLogs() {
            return [
                { id: 1, level: 'INFO', message: '系统启动成功', module: 'app', created_at: new Date().toISOString() },
                { id: 2, level: 'INFO', message: '数据库连接成功', module: 'database', created_at: new Date(Date.now() - 1000).toISOString() },
                { id: 3, level: 'INFO', message: '模型加载完成', module: 'model', created_at: new Date(Date.now() - 2000).toISOString() },
                { id: 4, level: 'WARNING', message: '检测到低内存警告', module: 'system', created_at: new Date(Date.now() - 5000).toISOString() },
                { id: 5, level: 'INFO', message: '用户admin登录成功', module: 'auth', created_at: new Date(Date.now() - 10000).toISOString() },
                { id: 6, level: 'ERROR', message: '图片上传失败：文件格式不正确', module: 'upload', created_at: new Date(Date.now() - 30000).toISOString() },
                { id: 7, level: 'INFO', message: '识别请求处理完成', module: 'recognition', created_at: new Date(Date.now() - 60000).toISOString() },
            ];
        }

        function displayLogs(data) {
            const container = document.getElementById('logContainer');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #a0aec0; padding: 40px;">暂无日志记录</div>';
                return;
            }

            const filtered = currentLevel === 'all' ? data : data.filter(log => log.level === currentLevel);

            filtered.forEach(log => {
                const item = document.createElement('div');
                const levelClass = `log-${log.level.toLowerCase()}`;
                const levelBadgeClass = `level-${log.level.toLowerCase()}`;
                
                item.className = `log-item ${levelClass}`;
                item.innerHTML = `
                    <div>
                        <span class="log-time">${formatTime(log.created_at)}</span>
                        <span class="log-level ${levelBadgeClass}">${log.level}</span>
                        <span class="log-message">${log.message}</span>
                    </div>
                    ${log.module ? `<div class="log-module">模块: ${log.module}</div>` : ''}
                `;
                container.appendChild(item);
            });
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function filterByLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            loadLogs();
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const toggle = document.getElementById('refreshToggle');
            toggle.classList.toggle('active');
            
            if (autoRefreshEnabled) {
                autoRefreshInterval = setInterval(loadLogs, 5000);
            } else {
                clearInterval(autoRefreshInterval);
            }
        }

        loadLogs();
    </script>
</body>
</html>
