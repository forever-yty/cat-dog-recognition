<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物智能助手 - 猫狗品种智能识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 50%, #1e1e2e 100%);
            min-height: 100vh;
            color: white;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .username {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .logout-btn {
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(239, 68, 68, 1);
        }
        
        .back-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 70px);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .chat-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }
        
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        
        .agent-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message-content {
            font-size: 15px;
            line-height: 1.6;
        }
        
        .message-image {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .message-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
            text-align: right;
        }
        
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            align-self: flex-start;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin-top: 10px;
        }
        
        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .message-input:focus {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .upload-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.3);
        }
        
        .send-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .help-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .help-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #2d2d44;
            border-radius: 15px;
            padding: 30px;
            width: 450px;
            max-width: 90%;
            animation: modalFadeIn 0.3s ease;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #f59e0b;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            resize: none;
        }
        
        .form-input:focus {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-textarea {
            min-height: 120px;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn-submit {
            flex: 2;
            padding: 12px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }
        
        .success-message {
            text-align: center;
            padding: 20px;
            color: #22c55e;
            font-size: 16px;
        }
        
        .hidden {
            display: none;
        }
        
        .upload-preview {
            position: absolute;
            bottom: 80px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 15px;
            display: none;
            z-index: 100;
        }
        
        .upload-preview.active {
            display: block;
        }
        
        .preview-image {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
        }
        
        .preview-remove {
            margin-top: 10px;
            padding: 5px 15px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .breed-result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 10px;
        }
        
        .breed-result h4 {
            color: #22c55e;
            margin-bottom: 5px;
        }
        
        .breed-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 14px;
        }
        
        .breed-link {
            color: #3b82f6;
            text-decoration: none;
        }
        
        .breed-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🐾</div>
            <span>猫狗品种智能识别系统</span>
        </div>
        <div class="header-right">
            <button class="back-btn" onclick="goHome()">← 返回</button>
            <button class="help-btn" onclick="showHelpModal()">🆘 困难帮助</button>
            <span class="username" id="username">用户</span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="chat-container">
        <div class="chat-header">
            <h1>🐕 宠物智能助手</h1>
            <p>我可以帮您识别宠物品种、解答宠物相关问题</p>
        </div>
        
        <div class="messages-container" id="messagesContainer">
            <div class="message agent-message">
                <div class="message-content">
                    您好！我是您的宠物智能助手🐾
                    <br><br>
                    我可以帮您：
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        <li>📷 识别宠物品种（上传图片）</li>
                        <li>❓ 解答宠物饲养问题</li>
                        <li>🏥 提供宠物健康建议</li>
                        <li>🎾 推荐宠物训练方法</li>
                    </ul>
                    <br>
                    请上传图片或输入您的问题！
                </div>
            </div>
        </div>
        
        <div class="upload-preview" id="uploadPreview">
            <img id="previewImg" class="preview-image" src="" alt="预览">
            <br>
            <button class="preview-remove" onclick="removeImage()">移除图片</button>
        </div>
        
        <div class="input-container">
            <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
            <div class="input-wrapper">
                <button class="upload-btn" onclick="document.getElementById('imageUpload').click()">
                    📷 图片
                </button>
                <input type="text" class="message-input" id="messageInput" placeholder="输入您的问题或上传图片..." onkeyup="handleKeyup(event)">
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                ➤ 发送
            </button>
        </div>
    </div>
    
    <!-- 困难帮助弹窗 -->
    <div class="modal-overlay" id="helpModal">
        <div class="modal">
            <div class="modal-title">🆘 困难帮助</div>
            <div id="helpModalContent">
                <div class="form-group">
                    <label class="form-label">问题类型</label>
                    <select class="form-input" id="feedbackType">
                        <option value="recognition">识别问题</option>
                        <option value="function">功能问题</option>
                        <option value="other">其他问题</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">问题描述</label>
                    <textarea class="form-input form-textarea" id="feedbackContent" placeholder="请详细描述您遇到的问题或困难..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeHelpModal()">取消</button>
                    <button class="btn-submit" onclick="submitHelp()">提交帮助请求</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE ='http://127.0.0.1:5000';
        let selectedImage = null;
        
        function getUsername() {
            const user = localStorage.getItem('user');py
            if (user) {
                const userObj = JSON.parse(user);
                document.getElementById('username').textContent = userObj.username;
            }
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        function handleImageUpload(input) {
            const file = input.files[0];
            if (file && file.type.startsWith('image/')) {
                selectedImage = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('uploadPreview').classList.add('active');
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function removeImage() {
            selectedImage = null;
            document.getElementById('uploadPreview').classList.remove('active');
            document.getElementById('previewImg').src = '';
        }
        
        function handleKeyup(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            if (!message && !selectedImage) {
                return;
            }
            
            sendBtn.disabled = true;
            
            const messagesContainer = document.getElementById('messagesContainer');
            
            if (message) {
                const userMessage = document.createElement('div');
                userMessage.className = 'message user-message';
                userMessage.innerHTML = `
                    <div class="message-content">${message}</div>
                    <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                `;
                messagesContainer.appendChild(userMessage);
            }
            
            if (selectedImage) {
                const userMessage = document.createElement('div');
                userMessage.className = 'message user-message';
                userMessage.innerHTML = `
                    <div class="message-content">
                        <img src="${document.getElementById('previewImg').src}" class="message-image" alt="上传的图片">
                    </div>
                    <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                `;
                messagesContainer.appendChild(userMessage);
            }
            
            input.value = '';
            removeImage();
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            messagesContainer.appendChild(typingIndicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            try {
                let response;
                
                if (selectedImage) {
                    const formData = new FormData();
                    formData.append('file', selectedImage);
                    formData.append('question', message || '');
                    
                    response = await fetch(`${API_BASE}/api/agent_predict`, {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    response = await fetch(`${API_BASE}/api/agent_chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ question: message })
                    });
                }
                
                const result = await response.json();
                
                typingIndicator.remove();
                
                const agentMessage = document.createElement('div');
                agentMessage.className = 'message agent-message';
                
                if (result.success) {
                    if (result.breeds && result.breeds.length > 0) {
                        let breedsHtml = '<div class="breed-result"><h4>🐾 识别结果：</h4>';
                        result.breeds.forEach((breed, index) => {
                            if (typeof breed === 'object' && breed.name) {
                                const confidence = (breed.score * 100).toFixed(2);
                                const breedName = breed.name.replace(/\([^)]*\)/g, '').trim();
                                breedsHtml += `
                                    <div class="breed-item">
                                        <span><a href="https://www.baidu.com/s?wd=${encodeURIComponent(breedName + ' 品种介绍')}" target="_blank" class="breed-link">${index + 1}. ${breed.name}</a></span>
                                        <span style="color: #22c55e;">${confidence}%</span>
                                    </div>
                                `;
                            } else {
                                breedsHtml += `<div class="breed-item"><span>${index + 1}. ${breed}</span></div>`;
                            }
                        });
                        breedsHtml += '</div>';
                        
                        agentMessage.innerHTML = `
                            <div class="message-content">
                                <p>图片识别完成！以下是识别结果：</p>
                                ${breedsHtml}
                            </div>
                            <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                        `;
                    } else if (result.answer) {
                        agentMessage.innerHTML = `
                            <div class="message-content">${result.answer}</div>
                            <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                        `;
                    }
                } else {
                    agentMessage.innerHTML = `
                        <div class="message-content">😔 抱歉，我无法回答您的问题：${result.message}</div>
                        <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                    `;
                }
                
                messagesContainer.appendChild(agentMessage);
            } catch (error) {
                typingIndicator.remove();
                
                const errorMessage = document.createElement('div');
                errorMessage.className = 'message agent-message';
                errorMessage.innerHTML = `
                    <div class="message-content">😔 连接失败，请稍后重试</div>
                    <div class="message-time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                `;
                messagesContainer.appendChild(errorMessage);
            } finally {
                sendBtn.disabled = false;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                selectedImage = null;
            }
        }
        
        getUsername();
        
        // 困难帮助功能
        function showHelpModal() {
            document.getElementById('helpModal').classList.add('show');
        }
        
        function closeHelpModal() {
            document.getElementById('helpModal').classList.remove('show');
            document.getElementById('feedbackContent').value = '';
            document.getElementById('feedbackType').value = 'recognition';
            document.getElementById('helpModalContent').innerHTML = `
                <div class="form-group">
                    <label class="form-label">问题类型</label>
                    <select class="form-input" id="feedbackType">
                        <option value="recognition">识别问题</option>
                        <option value="function">功能问题</option>
                        <option value="other">其他问题</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">问题描述</label>
                    <textarea class="form-input form-textarea" id="feedbackContent" placeholder="请详细描述您遇到的问题或困难..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeHelpModal()">取消</button>
                    <button class="btn-submit" onclick="submitHelp()">提交帮助请求</button>
                </div>
            `;
        }
        
        async function submitHelp() {
            const content = document.getElementById('feedbackContent').value.trim();
            const type = document.getElementById('feedbackType').value;
            
            if (!content) {
                alert('请输入问题描述');
                return;
            }
            
            const user = localStorage.getItem('user');
            let username = '匿名用户';
            if (user) {
                const userObj = JSON.parse(user);
                username = userObj.username;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content,
                        type,
                        username
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('helpModalContent').innerHTML = `
                        <div class="success-message">
                            ✅ 提交成功！<br><br>
                            您的问题已提交给管理员，我们会尽快处理。
                        </div>
                    `;
                    setTimeout(closeHelpModal, 2000);
                } else {
                    alert('提交失败：' + result.message);
                }
            } catch (error) {
                console.error('提交失败:', error);
                alert('提交失败，请稍后重试');
            }
        }
    </script>
