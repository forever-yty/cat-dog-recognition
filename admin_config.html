<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - PetWise 管理后台</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">PetWise 管理后台</div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('dashboard')"><span class="menu-icon">📊</span><span>仪表盘</span></div>
            <div class="menu-item" onclick="navigateTo('users')"><span class="menu-icon">👥</span><span>用户管理</span></div>
            <div class="menu-item" onclick="navigateTo('pets')"><span class="menu-icon">🐾</span><span>大模型管理</span></div>
            <div class="menu-item" onclick="navigateTo('knowledge')"><span class="menu-icon">📚</span><span>知识库</span></div>
            <div class="menu-item" onclick="navigateTo('sample')"><span class="menu-icon">🧪</span><span>难样本</span></div>
            <div class="menu-item" onclick="navigateTo('statistics')"><span class="menu-icon">📈</span><span>数据统计</span></div>
            <div class="menu-item" onclick="navigateTo('logs')"><span class="menu-icon">📋</span><span>系统日志</span></div>
            <div class="menu-item active" onclick="navigateTo('config')"><span class="menu-icon">⚙️</span><span>系统配置</span></div>
            <div class="menu-item" onclick="navigateTo('network')"><span class="menu-icon">🌐</span><span>网络配置</span></div>
            <div class="menu-item" onclick="navigateTo('sensitive')"><span class="menu-icon">🔒</span><span>敏感词</span></div>
            <div class="menu-item" onclick="navigateTo('feedback')"><span class="menu-icon">💬</span><span>用户反馈</span></div>
            <div class="menu-item" onclick="navigateTo('notice')"><span class="menu-icon">📢</span><span>公告管理</span></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">系统配置</div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="color: #4a5568; font-size: 14px;">admin</span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-title">系统设置</div>
                <div class="form-group">
                    <label class="form-label">系统名称</label>
                    <input type="text" class="form-input" value="PetWise">
                </div>
                <div class="form-group">
                    <label class="form-label">系统描述</label>
                    <input type="text" class="form-input" value="宠物智能识别系统">
                </div>
                <div class="form-group">
                    <label class="form-label">调试模式</label>
                    <div class="form-switch" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">自动保存</label>
                    <div class="form-switch active" onclick="this.classList.toggle('active')"></div>
                </div>
                <button class="btn btn-primary">保存配置</button>
            </div>
        </div>
    </div>
    <script src="assets/js/admin.js"></script>
</body>
</html>
