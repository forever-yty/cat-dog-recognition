<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫狗品种智能识别系统 - 视频识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .header-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            color: white;
            font-size: 14px;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        .main-content {
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-title h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .page-title p {
            color: #94a3b8;
            font-size: 14px;
        }
        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            border: 2px dashed rgba(59, 130, 246, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-section:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .upload-section.dragover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .upload-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
        }
        .upload-section h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .upload-section p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .upload-btn {
            padding: 12px 30px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            background: #1d4ed8;
        }
        #fileInput {
            display: none;
        }
        .preview-section {
            display: none;
            margin-top: 40px;
        }
        .preview-section.active {
            display: block;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .preview-header h3 {
            color: white;
            font-size: 18px;
        }
        .clear-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .preview-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }
        .preview-video {
            max-width: 600px;
            max-height: 400px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .predict-btn {
            padding: 14px 40px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .predict-btn:hover {
            background: #16a34a;
        }
        .predict-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            color: #3b82f6;
            font-size: 16px;
        }
        .loading.active {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }
        .progress-bar.active {
            display: block;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            width: 0%;
            transition: width 0.3s ease;
        }
        .result-section {
            display: none;
            margin-top: 40px;
        }
        .result-section.active {
            display: block;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
        }
        .result-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        .back-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .result-video {
            max-width: 400px;
            max-height: 300px;
            border-radius: 12px;
        }
        .result-info {
            flex: 1;
        }
        .result-info h3 {
            color: white;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .breed-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stat-tag {
            padding: 10px 20px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }
        .stat-tag .count {
            color: #22c55e;
            font-weight: bold;
            margin-left: 5px;
        }
        .result-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .action-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .action-btn.download {
            background: #3b82f6;
            color: white;
        }
        .action-btn.download:hover {
            background: #1d4ed8;
        }
        .action-btn.new {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .action-btn.new:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo-icon" onclick="goHome()">DC</div>
            <div class="header-title">猫狗品种智能识别系统</div>
        </div>
        <div class="header-right">
            <div class="user-info" id="userInfo">用户</div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-title">
            <h1>🎬 视频识别</h1>
            <p>上传视频文件，系统将追踪识别视频中的宠物品种</p>
        </div>
        
        <button class="back-btn" onclick="goHome()">← 返回</button>
        
        <div class="upload-section" id="uploadSection" onclick="triggerFileInput()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
            <div class="upload-icon">🎥</div>
            <h3>点击或拖拽上传视频</h3>
            <p>支持 MP4、AVI、MOV 格式，建议视频时长不超过30秒</p>
            <button class="upload-btn" onclick="event.stopPropagation(); triggerFileInput()">选择视频</button>
            <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(event)">
        </div>
        
        <div class="preview-section" id="previewSection">
            <div class="preview-header">
                <h3>预览视频</h3>
                <button class="clear-btn" onclick="clearPreview()">重新选择</button>
            </div>
            <div class="preview-container">
                <video id="previewVideo" class="preview-video" controls>您的浏览器不支持视频播放</video>
                <div>
                    <button class="predict-btn" id="predictBtn" onclick="predictVideo()">开始识别</button>
                    <div class="loading" id="loading">识别中...</div>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="result-card">
                <button class="back-btn" onclick="goHome()">← 返回</button>
                <div class="result-header">
                    <video id="resultVideo" class="result-video" controls>您的浏览器不支持视频播放</video>
                    <div class="result-info">
                        <h3>识别结果统计</h3>
                        <div class="breed-stats" id="breedStats"></div>
                        <div class="result-actions">
                            <button class="action-btn download" onclick="downloadResult()">下载结果</button>
                            <button class="action-btn new" onclick="clearAll()">识别新视频</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '';
        let selectedFile = null;
        let resultData = null;
        
        function checkLogin() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = 'login.html';
                return null;
            }
            return JSON.parse(user);
        }
        
        const user = checkLogin();
        if (user) {
            document.getElementById('userInfo').textContent = user.username;
        }
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        function triggerFileInput() {
            document.getElementById('fileInput').click();
        }
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                processFile(file);
            }
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('uploadSection').classList.add('dragover');
        }
        
        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('uploadSection').classList.remove('dragover');
        }
        
        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('uploadSection').classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('video/')) {
                    processFile(file);
                }
            }
        }
        
        function processFile(file) {
            selectedFile = file;
            
            const video = document.getElementById('previewVideo');
            video.src = URL.createObjectURL(file);
            video.load();
            
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('previewSection').classList.add('active');
            document.getElementById('resultSection').classList.remove('active');
        }
        
        function clearPreview() {
            selectedFile = null;
            document.getElementById('previewVideo').src = '';
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('uploadSection').style.display = 'block';
        }
        
        async function predictVideo() {
            if (!selectedFile) return;
            
            const predictBtn = document.getElementById('predictBtn');
            const loading = document.getElementById('loading');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            predictBtn.disabled = true;
            loading.classList.add('active');
            progressBar.classList.add('active');
            progressFill.style.width = '0%';
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            try {
                const response = await fetch(`${API_BASE}/api/video_predict`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultData = result;
                    displayResult(result);
                } else {
                    alert('识别失败: ' + result.message);
                }
            } catch (error) {
                alert('识别失败: ' + error.message);
            } finally {
                predictBtn.disabled = false;
                loading.classList.remove('active');
                progressBar.classList.remove('active');
            }
        }
        
        function displayResult(result) {
            const video = document.getElementById('resultVideo');
            video.src = `${API_BASE}${result.result_url}`;
            video.load();
            
            const breedStats = document.getElementById('breedStats');
            breedStats.innerHTML = '';
            
            result.breeds.forEach((breed, index) => {
                const tag = document.createElement('div');
                tag.className = 'stat-tag';
                tag.innerHTML = `${breed.name} <span class="count">${breed.count}次</span>`;
                breedStats.appendChild(tag);
            });
            
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('active');
        }
        
        function downloadResult() {
            if (resultData && resultData.result_url) {
                const link = document.createElement('a');
                link.href = `${API_BASE}${resultData.result_url}`;
                link.download = '识别结果.mp4';
                link.click();
            }
        }
        
        function clearAll() {
            clearPreview();
        }
    </script>
</body>
</html>
