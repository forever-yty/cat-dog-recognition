<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫狗品种智能识别系统 - 识别记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .header-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-info {
            color: white;
            font-size: 14px;
        }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        .main-content {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-title h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .page-title p {
            color: #94a3b8;
            font-size: 14px;
        }
        .back-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .filter-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .filter-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .filter-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .record-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            transition: all 0.3s ease;
        }
        .record-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .delete-btn:hover {
            background: rgba(239, 68, 68, 1);
        }
        .record-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .record-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .record-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .record-time {
            color: #94a3b8;
            font-size: 13px;
        }
        .record-type {
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            color: #3b82f6;
            font-size: 12px;
        }
        .breed-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .breed-tag {
            padding: 4px 10px;
            background: rgba(34, 197, 94, 0.2);
            border-radius: 10px;
            color: #22c55e;
            font-size: 12px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .breed-tag:hover {
            background: rgba(34, 197, 94, 0.3);
            color: #4ade80;
            text-decoration: underline;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
        }
        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
        }
        .empty-state h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .empty-state p {
            color: #94a3b8;
            font-size: 14px;
        }
        .view-btn {
            padding: 8px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .modal-header {
            margin-bottom: 20px;
        }
        .modal-header h3 {
            color: white;
            font-size: 20px;
        }
        .modal-image {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .modal-video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .modal-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .info-item {
            flex: 1;
            text-align: center;
        }
        .info-item .label {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .info-item .value {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        .modal-breeds h4 {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .modal-breeds .breed-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .modal-breeds .breed-tag {
            padding: 6px 14px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo-icon" onclick="goHome()">DC</div>
            <div class="header-title">猫狗品种智能识别系统</div>
        </div>
        <div class="header-right">
            <div class="user-info" id="userInfo">用户</div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-title">
            <h1>📊 识别记录</h1>
            <p>查看历史识别记录和结果</p>
        </div>
        
        <button class="back-btn" onclick="goHome()">← 返回</button>
        
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterRecords('all')">全部</button>
            <button class="filter-btn" onclick="filterRecords('image')">图片识别</button>
            <button class="filter-btn" onclick="filterRecords('video')">视频识别</button>
        </div>
        
        <div class="records-grid" id="recordsGrid">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <h3>暂无识别记录</h3>
                <p>开始识别宠物图片或视频以查看记录</p>
                <button class="view-btn" onclick="goHome()">去识别</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-header">
                <h3>识别详情</h3>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://127.0.0.1:5000';
        let allRecords = [];
        let currentFilter = 'all';
        
        function checkLogin() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = 'login.html';
                return null;
            }
            return JSON.parse(user);
        }
        
        const user = checkLogin();
        if (user) {
            document.getElementById('userInfo').textContent = user.username;
        }
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        async function loadRecords() {
            try {
                const response = await fetch(`${API_BASE}/api/records`);
                const result = await response.json();
                
                if (result.success) {
                    allRecords = result.records;
                    renderRecords();
                }
            } catch (error) {
                console.log('加载记录失败:', error);
            }
        }
        
        function filterRecords(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderRecords();
        }
        
        function renderRecords() {
            const grid = document.getElementById('recordsGrid');
            const filtered = currentFilter === 'all' ? allRecords : allRecords.filter(r => r.type === currentFilter);
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <h3>暂无识别记录</h3>
                        <p>开始识别宠物图片或视频以查看记录</p>
                        <button class="view-btn" onclick="goHome()">去识别</button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = '';
            
            filtered.forEach(record => {
                const card = document.createElement('div');
                card.className = 'record-card';
                
                const media = record.type === 'video' 
                    ? `<video src="${API_BASE}${record.preview}" controls>您的浏览器不支持视频播放</video>`
                    : `<img src="${API_BASE}${record.preview}" alt="识别结果">`;
                
                card.innerHTML = `
                    ${media}
                    <button class="delete-btn" onclick="deleteRecord(event, '${record.id}')">删除</button>
                    <div class="record-info">
                        <span class="record-time">${record.time}</span>
                        <span class="record-type">${record.type === 'video' ? '🎬 视频' : '🖼️ 图片'}</span>
                    </div>
                    <div class="breed-list">
                        ${record.breeds.slice(0, 3).map(b => {
                            const breedName = b.replace(/\([^)]*\)/g, '').trim();
                            return `<a href="https://www.baidu.com/s?wd=${encodeURIComponent(breedName + ' 品种介绍')}" target="_blank" class="breed-tag">${b}</a>`;
                        }).join('')}
                        ${record.breeds.length > 3 ? `<span class="breed-tag">+${record.breeds.length - 3}</span>` : ''}
                    </div>
                `;
                
                card.querySelector('video, img').addEventListener('click', () => openModal(record));
                grid.appendChild(card);
            });
        }
        
        function openModal(record) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            const media = record.type === 'video' 
                ? `<video class="modal-video" src="${API_BASE}${record.preview}" controls>您的浏览器不支持视频播放</video>`
                : `<img class="modal-image" src="${API_BASE}${record.preview}" alt="识别结果">`;
            
            content.innerHTML = `
                ${media}
                <div class="modal-info">
                    <div class="info-item">
                        <div class="label">类型</div>
                        <div class="value">${record.type === 'video' ? '视频识别' : '图片识别'}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">时间</div>
                        <div class="value">${record.time}</div>
                    </div>
                </div>
                <div class="modal-breeds">
                    <h4>识别品种</h4>
                    <div class="breed-list">
                        ${record.breeds.map(b => `<span class="breed-tag">${b}</span>`).join('')}
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function deleteRecord(event, recordId) {
            event.stopPropagation();
            
            if (!confirm('确定要删除这条记录吗？此操作无法撤销。')) {
                return;
            }
            
            fetch(`${API_BASE}/api/delete_record/${recordId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('删除成功');
                    loadRecords();
                } else {
                    alert('删除失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('删除失败，请稍后重试');
            });
        }
        
        loadRecords();
    </script>
</body>
</html>
