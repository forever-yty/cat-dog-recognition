<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敏感词 - PetWise 管理后台</title>
    <link rel="stylesheet" href="assets/css/admin.css">
    <style>
        .form-group { display: flex; gap: 10px; }
        .sensitive-list { max-height: 300px; overflow-y: auto; }
        .sensitive-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .btn-danger { background: #fc8181; color: white; }
        .btn-edit { background: #63b3ed; color: white; padding: 5px 10px; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">PetWise 管理后台</div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('dashboard')"><span class="menu-icon">📊</span><span>仪表盘</span></div>
            <div class="menu-item" onclick="navigateTo('users')"><span class="menu-icon">👥</span><span>用户管理</span></div>
            <div class="menu-item" onclick="navigateTo('pets')"><span class="menu-icon">🐾</span><span>大模型管理</span></div>
            <div class="menu-item" onclick="navigateTo('knowledge')"><span class="menu-icon">📚</span><span>知识库</span></div>
            <div class="menu-item" onclick="navigateTo('sample')"><span class="menu-icon">🧪</span><span>难样本</span></div>
            <div class="menu-item" onclick="navigateTo('statistics')"><span class="menu-icon">📈</span><span>数据统计</span></div>
            <div class="menu-item" onclick="navigateTo('logs')"><span class="menu-icon">📋</span><span>系统日志</span></div>
            <div class="menu-item" onclick="navigateTo('config')"><span class="menu-icon">⚙️</span><span>系统配置</span></div>
            <div class="menu-item" onclick="navigateTo('network')"><span class="menu-icon">🌐</span><span>网络配置</span></div>
            <div class="menu-item active" onclick="navigateTo('sensitive')"><span class="menu-icon">🔒</span><span>敏感词</span></div>
            <div class="menu-item" onclick="navigateTo('feedback')"><span class="menu-icon">💬</span><span>用户反馈</span></div>
            <div class="menu-item" onclick="navigateTo('notice')"><span class="menu-icon">📢</span><span>公告管理</span></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">敏感词管理</div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="color: #4a5568; font-size: 14px;">admin</span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">敏感词列表</div>
                    <div class="form-group">
                        <input type="text" class="form-input" id="newWord" placeholder="添加敏感词..." onkeyup="handleKeyPress(event)">
                        <button class="btn btn-primary" onclick="addSensitiveWord()">添加</button>
                    </div>
                </div>
                <div class="sensitive-list" id="sensitiveList">
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title">编辑敏感词</div>
            <input type="hidden" id="editId">
            <input type="text" class="form-input" id="editWord" placeholder="输入敏感词">
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        async function loadSensitiveWords() {
            try {
                const result = await apiRequest('/api/sensitive');
                if (result.success) {
                    displayWords(result.data);
                } else {
                    displayWords(getMockWords());
                }
            } catch (error) {
                console.error('加载敏感词失败:', error);
                displayWords(getMockWords());
            }
        }

        function getMockWords() {
            return [
                { id: 1, word: '敏感词1', created_at: '2024-01-01T10:00:00' },
                { id: 2, word: '敏感词2', created_at: '2024-01-02T11:00:00' },
                { id: 3, word: '敏感词3', created_at: '2024-01-03T12:00:00' },
            ];
        }

        function displayWords(words) {
            const list = document.getElementById('sensitiveList');
            list.innerHTML = '';

            if (words.length === 0) {
                list.innerHTML = '<div class="no-data">暂无敏感词</div>';
                return;
            }

            words.forEach(item => {
                const div = document.createElement('div');
                div.className = 'sensitive-item';
                div.innerHTML = `
                    <span>${item.word}</span>
                    <div>
                        <button class="btn btn-edit" onclick="showEditModal(${item.id}, '${item.word}')">编辑</button>
                        <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteWord(${item.id})">删除</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addSensitiveWord();
            }
        }

        async function addSensitiveWord() {
            const word = document.getElementById('newWord').value.trim();
            if (!word) {
                alert('请输入敏感词');
                return;
            }

            try {
                const result = await apiRequest('/api/sensitive', {
                    method: 'POST',
                    body: JSON.stringify({ word })
                });
                alert(result.message);
                if (result.success) {
                    document.getElementById('newWord').value = '';
                    loadSensitiveWords();
                }
            } catch (error) {
                console.error('添加敏感词失败:', error);
                alert('添加敏感词失败');
            }
        }

        function showEditModal(id, word) {
            document.getElementById('editId').value = id;
            document.getElementById('editWord').value = word;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const word = document.getElementById('editWord').value.trim();

            if (!word) {
                alert('请输入敏感词');
                return;
            }

            try {
                const result = await apiRequest(`/api/sensitive/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ word })
                });
                alert(result.message);
                if (result.success) {
                    closeModal();
                    loadSensitiveWords();
                }
            } catch (error) {
                console.error('更新敏感词失败:', error);
                alert('更新敏感词失败');
            }
        }

        async function deleteWord(id) {
            if (!confirm('确定要删除该敏感词吗？')) return;

            try {
                const result = await apiRequest(`/api/sensitive/${id}`, { method: 'DELETE' });
                alert(result.message);
                if (result.success) {
                    loadSensitiveWords();
                }
            } catch (error) {
                console.error('删除敏感词失败:', error);
                alert('删除敏感词失败');
            }
        }

        loadSensitiveWords();
    </script>
</body>
</html>
