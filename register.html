<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫狗品种智能识别系统 - 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #3b82f6 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .logo h1 {
            color: #1e293b;
            font-size: 24px;
        }
        .logo p {
            color: #64748b;
            font-size: 14px;
        }
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .role-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .role-btn:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }
        .role-btn.active {
            border-color: #3b82f6;
            background: #3b82f6;
            color: white;
        }
        .role-btn .icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .role-btn .text {
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #1e293b;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-group .hint {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 5px;
        }
        .register-btn {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .register-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        .register-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
        .msg {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .msg.success {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            display: block;
        }
        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            display: block;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
        }
        .login-link a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <div class="logo-icon">DC</div>
            <h1>注册账号</h1>
            <p>创建您的猫狗识别系统账号</p>
        </div>
        
        <div class="role-selector">
            <div class="role-btn active" onclick="selectRole('user')">
                <div class="icon">👤</div>
                <div class="text">普通用户</div>
            </div>
            <div class="role-btn" onclick="selectRole('admin')">
                <div class="icon">⚙️</div>
                <div class="text">管理员</div>
            </div>
        </div>
        
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required minlength="3" maxlength="20">
                <div class="hint">用户名长度3-20个字符</div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required minlength="6">
                <div class="hint">密码至少6个字符</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="register-btn" id="registerBtn">注册</button>
            <div class="msg" id="msg"></div>
        </form>
        
        <div class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://127.0.0.1:5000';
        let currentRole = 'user';
        
        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('msg');
            const registerBtn = document.getElementById('registerBtn');
            
            if (password !== confirmPassword) {
                msg.className = 'msg error';
                msg.textContent = '两次输入的密码不一致';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        role: currentRole
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    msg.className = 'msg success';
                    msg.textContent = result.message;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    msg.className = 'msg error';
                    msg.textContent = result.message;
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                }
            } catch (error) {
                msg.className = 'msg error';
                msg.textContent = '网络错误，请检查后端服务是否启动';
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
